name: Content Factory Daily Pipeline

on:
  schedule:
    - cron: '0 15 * * *' # 毎日 JST 00:00 (UTC 15:00) に実行
  workflow_dispatch:      # 手動実行ボタンも追加

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install google-genai requests python-dotenv
          
      - name: Run Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_DATABASE_ID_ARTICLES: ${{ secrets.NOTION_DATABASE_ID_ARTICLES }}
        run: |
          python3 yt_trend_crawler.py
          python3 trend_extractor.py
          python3 content_generator.py
          python3 formatter.py
          python3 publisher.py
